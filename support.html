<script>
document.getElementById('navbar-container').innerHTML = getNavbar('Support');
document.getElementById('footer-container').innerHTML = getFooter();
initNavbarScroll(false);
initScrollAnimations();

function updateCharCount(el) {
  document.getElementById('char-count').textContent = el.value.length;
}

async function sendMessage() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const subject = document.getElementById('subject').value.trim();
  const desc = document.getElementById('description').value.trim();

  if (!name || !email || !subject || !desc) {
    alert('Please fill in all required fields.');
    return;
  }

  // Send to PHP backend (database)
  const formData = new FormData();
  formData.append('customer_name', name);
  formData.append('email',         email);
  formData.append('subject',       subject);
  formData.append('description',   desc);

  try {
    const response = await fetch('support_handler.php', {
      method: 'POST',
      body: formData
    });
    const result = await response.json();

    if (result.success) {
      // Clear form
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      document.getElementById('subject').value = '';
      document.getElementById('description').value = '';
      document.getElementById('char-count').textContent = '0';

      // Show success
      document.getElementById('success-msg').style.display = 'block';
      setTimeout(() => {
        document.getElementById('success-msg').style.display = 'none';
      }, 5000);
    } else {
      alert('⚠️ ' + result.message);
    }
  } catch (err) {
    alert('⚠️ Error: ' + err.message);
  }
}
</script>
